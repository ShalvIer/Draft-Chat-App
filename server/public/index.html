<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat app</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.8.1/socket.io.js"></script>
    <script src="app.js" defer></script>
</head>
<body>
    <main>
        <form class="form-join">
            <input type="text" id="nickname" maxlength="12" placeholder="Your name" size="5">
            <input type="text" id="private-room" placeholder="Chat room" size="5" required>
            <button id="join" type="submit">Join!</button>
        </form>

        <ul class="chat-dis"></ul>

        <p class="user-list"></p>

        <p class="room-list"></p>

        <p class="current_action"></p>

        <form class="form-message">
            <input type="text" id="message" placeholder="Type Your Message!" required>
            <button type="submit">Send!</button>
        </form>
</main>
    
</body>
</html>
